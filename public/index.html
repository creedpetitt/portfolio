<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creed Petitt | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="mac-buttons">
                <div class="mac-button close"></div>
                <div class="mac-button minimize"></div>
                <div class="mac-button maximize"></div>
            </div>
            <div class="header-title">Creed Petitt</div>
        </div>
        <div class="terminal-body" id="terminal-body">
            <div class="output" id="output">
                <!-- Dynamic Content -->
            </div>
            <div class="input-line">
                <span class="prompt">
                    <span class="user">creed</span> <span class="symbol">~ $</span>
                </span>
                <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
